<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Acquisition | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border-t-4 border-transparent" style="border-image: linear-gradient(to right, #0ea5e9, #10b981) 1;">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-sky-500 to-emerald-400">
                Target Acquisition
            </h1>
            <p class="text-gray-500 mt-2 text-sm">Secure Portal Access</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" required 
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-rose-400 focus:border-rose-400 transition-colors outline-none"
                    placeholder="Enter your username">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" required 
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-rose-400 focus:border-rose-400 transition-colors outline-none"
                    placeholder="••••••••">
            </div>

            <div id="errorMessage" class="hidden text-rose-500 text-sm font-medium text-center bg-rose-50 py-2 rounded">
                Invalid credentials. Please try again.
            </div>

            <button type="submit" id="loginBtn"
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-semibold text-white bg-gradient-to-r from-sky-500 to-emerald-400 hover:from-rose-400 hover:to-rose-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-rose-400 transition-all duration-300">
                Sign In
            </button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
